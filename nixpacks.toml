# Railway / Nixpacks build configuration for the BakiMate Laravel API.
#
# Railway auto-detects the PHP provider from composer.json and provisions a
# Caddy + PHP-FPM image. We override only what we need:
#   - install: production-only composer install + autoloader optimisation.
#   - build:   cache Laravel config / routes / views for the immutable image.
#
# Migrations + storage:link run on every container start via Procfile's
# `release` command, which Railway honours before promoting the new deploy.

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress",
]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
]
